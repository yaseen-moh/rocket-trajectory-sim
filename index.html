<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rocket Trajectory Simulator — Live Demo</title>
<style>
  body { margin:0; background:#0d1117; color:#e6e6f0; font-family: 'Segoe UI', system-ui, sans-serif; }
  #wrap { max-width: 960px; margin:0 auto; padding:20px; }
  h1 { font-size:1.3rem; margin-bottom:4px; }
  h2 { font-size:0.95rem; margin:18px 0 6px; color:#c8c8e0; }
  p.sub { color:#9090a8; margin-top:0; font-size:0.9rem; }
  canvas { background:#111726; border-radius:8px; display:block; margin:12px 0; }
  .controls { display:grid; grid-template-columns: repeat(4, 1fr); gap:12px 16px; margin-bottom:6px;}
  label { font-size:0.78rem; color:#b0b0c8; display:flex; flex-direction:column; gap:4px;}
  input[type=range]{ width:100%; }
  select { background:#1c2333; color:#e6e6f0; border:1px solid #3a3a5c; padding:6px 8px; border-radius:6px; font-size:0.8rem;}
  #readout { display:flex; gap:22px; flex-wrap:wrap; font-size:0.85rem; color:#c8c8e0; margin-top:8px;}
  #readout b { color:#7fffd4; }
  #readout .warn { color:#ffb454; }
  button { background:#3a3a5c; color:#fff; border:none; padding:8px 14px; border-radius:6px; cursor:pointer; font-size:0.85rem; margin-top:6px;}
  button:hover { background:#4a4a72; }
  .checkbox-row { display:flex; align-items:center; gap:6px; font-size:0.8rem; color:#b0b0c8; }
  .section { background:#151b28; padding:12px 14px; border-radius:8px; margin-bottom:12px; }
</style>
</head>
<body>
<div id="wrap">
  <h1>Rocket Trajectory Simulator</h1>
  <p class="sub">Point-mass model with ISA-style drag falloff, motor thrust curve, fin geometry, and wind — everything below redraws the flight live.</p>

  <div class="section">
    <h2>Rocket configuration</h2>
    <div class="controls">
      <label>Dry mass (kg): <span id="massVal">0.55</span>
        <input type="range" id="mass" min="20" max="200" value="55"></label>
      <label>Body diameter (mm): <span id="diaVal">41</span>
        <input type="range" id="dia" min="20" max="80" value="41"></label>
      <label>Fin root chord (cm): <span id="rootVal">12</span>
        <input type="range" id="rootChord" min="4" max="25" value="12"></label>
      <label>Fin span (cm): <span id="spanVal">9</span>
        <input type="range" id="finSpan" min="3" max="20" value="9"></label>
      <label>Fin count: <span id="finCountVal">4</span>
        <input type="range" id="finCount" min="3" max="6" value="4"></label>
      <label>Motor
        <select id="motor">
          <option value="A8">Estes A8 (small, short burn)</option>
          <option value="C6" selected>Estes C6 (medium)</option>
          <option value="D12">Estes D12 (large, long burn)</option>
        </select>
      </label>
      <label class="checkbox-row" style="margin-top:18px;">
        <input type="checkbox" id="parachute" checked> Parachute deploys at apogee
      </label>
    </div>
  </div>

  <div class="section">
    <h2>Launch conditions</h2>
    <div class="controls">
      <label>Launch angle from vertical: <span id="angleVal">5</span>°
        <input type="range" id="angle" min="0" max="25" value="5"></label>
      <label>Base wind (m/s): <span id="windVal">3</span>
        <input type="range" id="wind" min="0" max="15" value="3"></label>
    </div>
  </div>

  <button id="runBtn">Re-run flight (new gust seed)</button>
  <canvas id="c" width="900" height="420"></canvas>
  <div id="readout">
    <span>Apogee: <b id="apogeeOut">-</b> m</span>
    <span>Downrange: <b id="rangeOut">-</b> m</span>
    <span>Flight time: <b id="timeOut">-</b> s</span>
    <span>Max speed: <b id="speedOut">-</b> m/s</span>
    <span>Fin area: <b id="finAreaOut">-</b> cm²</span>
    <span id="stabilityOut"></span>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const G0 = 9.80665;

const MOTORS = {
  A8:  { curve: [[0,0],[0.05,60],[0.15,50],[0.4,42],[0.5,0]], burnTime: 0.5, propMass: 0.0125 },
  C6:  { curve: [[0,0],[0.05,180],[0.2,220],[0.6,200],[1.2,160],[1.8,90],[2.0,0]], burnTime: 2.0, propMass: 0.06 },
  D12: { curve: [[0,0],[0.08,240],[0.3,300],[0.8,260],[1.6,200],[2.4,140],[2.5,0]], burnTime: 2.5, propMass: 0.10 },
};

function thrustAt(curve, burnTime, t){
  if(t>burnTime) return 0;
  for(let i=0;i<curve.length-1;i++){
    const [t0,q0]=curve[i], [t1,q1]=curve[i+1];
    if(t>=t0 && t<=t1) return q0 + (q1-q0)*(t-t0)/(t1-t0);
  }
  return 0;
}
function isaDensity(alt){
  const T0=288.15,P0=101325,L=0.0065,R=287.05;
  let T,P;
  if(alt<11000){ T=T0-L*alt; P=P0*Math.pow(T/T0, G0/(R*L)); }
  else { T=216.65; P=22632.06*Math.exp(-G0*(alt-11000)/(R*T)); }
  return P/(R*T);
}

let rng_seed = 42;
function rand(){ rng_seed = (rng_seed*1103515245+12345) & 0x7fffffff; return (rng_seed/0x7fffffff); }
function gaussian(){
  const u1=rand(), u2=rand();
  return Math.sqrt(-2*Math.log(u1+1e-9))*Math.cos(2*Math.PI*u2);
}

// Rough Barrowman-style stability indicator (simplified): bigger fins move
// the center of pressure further aft of the nose, which is what gives a
// rocket weathercock stability. This isn't a full CP calculation, just a
// directionally-correct proxy so the demo can flag "too little fin" the
// same way real rocket designers watch for it.
function stabilityMargin(finAreaCm2, bodyDiaMm, dryMassG){
  const finContribution = finAreaCm2 * 0.012;
  const massPenalty = dryMassG * 0.0006;
  return finContribution - massPenalty; // rough "calibers of margin" proxy, >0 = stable-ish
}

function simulate(cfg){
  const { dryMass, bodyDia, rootChord, finSpan, finCount, motorKey, angleDeg, baseWind, parachute } = cfg;
  const motor = MOTORS[motorKey];
  const propMass = motor.propMass;
  const burnTime = motor.burnTime;
  const area = Math.PI*(bodyDia/2)**2;
  const cdBody = 0.42;
  const tipChord = rootChord*0.4;
  const finArea = 0.5*(rootChord+tipChord)*finSpan*finCount; // cm^2 (all in cm here)
  const finAreaM2 = finArea*1e-4;
  const cd = cdBody + 0.15*(finAreaM2/area);

  const theta0 = (90-angleDeg)*Math.PI/180;
  let x=0,y=0,vx=0,vy=0,t=0;
  const dt=0.02;
  const traj=[[x,y]];
  let maxSpeed=0;
  let parachuteDeployed=false;
  let apogeeSeen=false;
  const gustStd = 1.5;

  while(t<90){
    const m = t>=burnTime ? dryMass : dryMass+propMass*(1-t/burnTime);
    const thrust = thrustAt(motor.curve, burnTime, t);
    let dirx,diry;
    const speed=Math.hypot(vx,vy);
    if(speed>1e-6){ dirx=vx/speed; diry=vy/speed; }
    else { dirx=Math.cos(theta0); diry=Math.sin(theta0); }

    if(!apogeeSeen && vy<0 && t>burnTime) apogeeSeen=true;
    if(parachute && apogeeSeen) parachuteDeployed=true;

    const rho = isaDensity(Math.max(y,0));
    const effectiveCd = parachuteDeployed ? 1.6 : cd;
    const effectiveArea = parachuteDeployed ? area*9 : area; // parachute vastly increases effective drag area
    const wind = baseWind + gaussian()*gustStd;
    const relvx = vx-wind, relvy=vy;
    const relspeed = Math.hypot(relvx,relvy);
    const drag = 0.5*rho*effectiveCd*effectiveArea*relspeed*relspeed;
    const dragx = relspeed>1e-6 ? -drag*(relvx/relspeed) : 0;
    const dragy = relspeed>1e-6 ? -drag*(relvy/relspeed) : 0;

    let ax = (thrust*dirx+dragx)/m;
    let ay = (thrust*diry+dragy)/m - G0;

    if(y<=0){
      if(thrust<=m*G0){ ax=0; ay=0; vx=0; vy=0; }
      else { vx=0; vy=Math.max(vy,0); }
    }

    vx += ax*dt; vy += ay*dt;
    x += vx*dt; y += vy*dt;
    if(y<0) y=0;
    t += dt;
    maxSpeed = Math.max(maxSpeed, Math.hypot(vx,vy));
    traj.push([x,y]);
    if(t>0.5 && y<=0 && traj.length>50) break;
  }
  const apogee = Math.max(...traj.map(p=>p[1]));
  const apogeeIdx = traj.findIndex(p=>p[1]===apogee);
  return {
    traj, apogee, apogeeTime: apogeeIdx*dt, range: x, flightTime: t, maxSpeed,
    finAreaCm2: finArea,
    stability: stabilityMargin(finArea, bodyDia, dryMass*1000),
  };
}

function draw(result){
  ctx.fillStyle = '#111726';
  ctx.fillRect(0,0,W,H);
  const pad=40;
  const maxX = Math.max(...result.traj.map(p=>p[0]), 10);
  const maxY = Math.max(...result.traj.map(p=>p[1]), 10);
  const sx = (W-2*pad)/maxX;
  const sy = (H-2*pad)/maxY;
  const scale = Math.min(sx,sy);

  ctx.strokeStyle = '#333a4a';
  ctx.beginPath(); ctx.moveTo(pad, H-pad); ctx.lineTo(W-pad, H-pad); ctx.stroke();

  ctx.beginPath();
  ctx.strokeStyle = '#7fffd4';
  ctx.lineWidth = 2;
  result.traj.forEach(([x,y], i)=>{
    const px = pad + x*scale;
    const py = H-pad - y*scale;
    if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
  });
  ctx.stroke();

  const apIdx = result.traj.findIndex(p=>p[1]===result.apogee);
  const [ax,ay] = result.traj[apIdx];
  ctx.fillStyle = '#feca57';
  ctx.beginPath();
  ctx.arc(pad+ax*scale, H-pad-ay*scale, 5, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#c8c8e0';
  ctx.font = '11px sans-serif';
  ctx.fillText(`apogee: ${result.apogee.toFixed(0)} m`, pad+ax*scale+8, H-pad-ay*scale-6);
}

function readConfig(){
  const mass = +document.getElementById('mass').value/100;      // kg
  const dia = +document.getElementById('dia').value/1000;        // m
  const rootChord = +document.getElementById('rootChord').value; // cm
  const finSpan = +document.getElementById('finSpan').value;      // cm
  const finCount = +document.getElementById('finCount').value;
  const motorKey = document.getElementById('motor').value;
  const angle = +document.getElementById('angle').value;
  const wind = +document.getElementById('wind').value;
  const parachute = document.getElementById('parachute').checked;

  document.getElementById('massVal').textContent = mass.toFixed(2);
  document.getElementById('diaVal').textContent = (dia*1000).toFixed(0);
  document.getElementById('rootVal').textContent = rootChord;
  document.getElementById('spanVal').textContent = finSpan;
  document.getElementById('finCountVal').textContent = finCount;
  document.getElementById('angleVal').textContent = angle;
  document.getElementById('windVal').textContent = wind;

  return { dryMass:mass, bodyDia:dia, rootChord, finSpan, finCount, motorKey, angleDeg:angle, baseWind:wind, parachute };
}

function run(){
  const cfg = readConfig();
  const result = simulate(cfg);
  draw(result);
  document.getElementById('apogeeOut').textContent = result.apogee.toFixed(1);
  document.getElementById('rangeOut').textContent = result.range.toFixed(1);
  document.getElementById('timeOut').textContent = result.flightTime.toFixed(2);
  document.getElementById('speedOut').textContent = result.maxSpeed.toFixed(1);
  document.getElementById('finAreaOut').textContent = result.finAreaCm2.toFixed(0);

  const stabEl = document.getElementById('stabilityOut');
  if(result.stability < 0){
    stabEl.innerHTML = '<span class="warn">⚠ likely unstable -- add more fin area or reduce mass</span>';
  } else {
    stabEl.innerHTML = '<span style="color:#7fffb0;">stability margin looks reasonable</span>';
  }
}

['mass','dia','rootChord','finSpan','finCount','angle','wind'].forEach(id=>{
  document.getElementById(id).addEventListener('input', run);
});
document.getElementById('motor').addEventListener('change', run);
document.getElementById('parachute').addEventListener('change', run);
document.getElementById('runBtn').addEventListener('click', ()=>{
  rng_seed = Math.floor(Math.random()*1e9);
  run();
});

run();
</script>
</body>
</html>
